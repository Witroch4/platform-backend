services:
  app:
    container_name: chatwit_dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      # Inclui as variáveis de concorrência do batch/transcrição
      - .env.development
    environment:
      # Informa ao server.js que estamos dentro do Docker
      RUN_IN_DOCKER: "true"

      # Dev watch (Essencial para hot reload no Windows/WSL)
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      FAST_REFRESH: "true"
      NEXT_WEBPACK_USEPOLLING: "true"
      NEXT_SCRIPT: dev:turbo

      # Redis
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"

      # Ngrok
      NGROK_AUTHTOKEN: "2q8n28IDz0mMwNr02MlHnLGsbKE_6ohF5ifRMgFBW867Mk5Zi"
    ports:
      - "3002:3002"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - ./temp:/app/temp
    command: sh -c "pnpm run ${NEXT_SCRIPT:-dev}"
    networks:
      - minha_rede
    # Alterado para não iniciar automaticamente
    restart: "no"

  # ============================================================================
  # WORKER UNIFICADO - TODOS OS WORKERS EM UM ÚNICO CONTAINER (DEV)
  # ============================================================================
  worker:
    container_name: chatwit_worker_unified
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      # Inclui as variáveis de concorrência do batch/transcrição
      - .env.development
    environment:
      RUN_IN_DOCKER: "true"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
    # Comando para iniciar TODOS os workers usando o init.ts
    command: pnpm run start:unified-worker
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - ./temp:/app/temp
    networks:
      - minha_rede
    # Alterado para não iniciar automaticamente
    restart: "no"

volumes:
  # Para pnpm, manter node_modules como volume nomeado para cache de dependências
  node_modules:
    driver: local

networks:
  minha_rede:
    external: true
    name: minha_rede