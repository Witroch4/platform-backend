services:
  app:
    container_name: chatwit_dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env.development.ngrok
    environment:
      # Informa ao server.js que estamos dentro do Docker
      RUN_IN_DOCKER: "true"

      # Dev watch
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      FAST_REFRESH: "true"
      NEXT_WEBPACK_USEPOLLING: "true"
      NEXT_SCRIPT: dev:turbo

      # Redis
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"

      # Ngrok
      NGROK_AUTHTOKEN: "2q8n28IDz0mMwNr02MlHnLGsbKE_6ohF5ifRMgFBW867Mk5Zi"
      NGROK_URL: "https://moved-chigger-randomly.ngrok-free.app"
    ports:
      - "3002:3002"

    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - ./temp:/app/temp
    command: sh -c "pnpm run ${NEXT_SCRIPT:-dev}"
    networks:
      - minha_rede
    restart: unless-stopped
    depends_on:
      - redis
      - postgres

  # ============================================================================
  # WORKER UNIFICADO - TODOS OS WORKERS EM UM ÚNICO CONTAINER (DEV)
  # ============================================================================
  worker:
    container_name: chatwit_worker_unified
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env.development.ngrok
    environment:
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
    # Comando para iniciar TODOS os workers usando o init.ts
    command: pnpm run start:unified-worker
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - ./temp:/app/temp
    networks:
      - minha_rede
    restart: unless-stopped
    depends_on:
      - redis
      - postgres

  # ───────────────────────────────────────────────────────
  # Redis
  # ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chatwit_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - minha_rede
    restart: unless-stopped

  # ───────────────────────────────────────────────────────
  # Postgres (pgvector)
  # ───────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: chatwit_postgres
    environment:
      POSTGRES_DB: socialWise
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - minha_rede
    restart: unless-stopped

  # ───────────────────────────────────────────────────────
  # NGROK - Serviço separado
  # ───────────────────────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    container_name: chatwit_ngrok
    env_file:
      - .env.development.ngrok
    command: http app:3002 --url=moved-chigger-randomly.ngrok-free.app
    ports:
      - "4040:4040"  # Interface web do ngrok
    networks:
      - minha_rede
    depends_on:
      - app
    restart: unless-stopped

volumes:
  # Para pnpm, manter node_modules como volume nomeado para cache de dependências
  node_modules:
    driver: local
  redis_data:
    driver: local
  pg_data:
    driver: local

networks:
  minha_rede:
    external: true
    name: minha_rede
