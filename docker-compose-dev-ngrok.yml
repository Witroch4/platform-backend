services:
  app:
    container_name: chatwit_dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env.development.ngrok
    environment:
      # Dev watch
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      FAST_REFRESH: "true"
      NEXT_WEBPACK_USEPOLLING: "true"
      NEXT_SCRIPT: dev:turbo

      # Redis
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"

      # Ngrok (não iniciar dentro do app; token vem via env_file se necessário)
    ports:
      - "3000:3000"
      - "3005:3005" # Bull Board
    volumes:
      - .:/src
      - node_modules:/src/node_modules
      - ./temp:/src/temp
    command: sh -c "npm run ${NEXT_SCRIPT:-dev}"
    networks:
      - minha_rede
    restart: unless-stopped
    depends_on:
      - redis
      - postgres

  # ───────────────────────────────────────────────────────
  # Worker 1: automacao (worker/automacao.worker.ts)
  # ───────────────────────────────────────────────────────
  automacao_worker:
    container_name: chatwit_worker_automacao
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env.development.ngrok
    environment:
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
    command: npm run start:worker        # roda worker/automacao.worker.ts
    volumes:
      - .:/src
      - node_modules:/src/node_modules
    networks:
      - minha_rede
    restart: unless-stopped
    depends_on:
      - redis
      - postgres

  # ───────────────────────────────────────────────────────
  # Worker 2: webhook (worker/webhook.worker.ts)
  # ───────────────────────────────────────────────────────
  webhook_worker:
    container_name: chatwit_worker_webhook
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env.development.ngrok
    environment:
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
    command: npm run worker             # roda worker/webhook.worker.ts
    volumes:
      - .:/src
      - node_modules:/src/node_modules
    networks:
      - minha_rede
    restart: unless-stopped
    depends_on:
      - redis
      - postgres

  # ───────────────────────────────────────────────────────
  # Redis
  # ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chatwit_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - minha_rede
    restart: unless-stopped

  # ───────────────────────────────────────────────────────
  # Postgres (pgvector)
  # ───────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: chatwit_postgres
    environment:
      POSTGRES_DB: socialwise
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - minha_rede
    restart: unless-stopped

  # ───────────────────────────────────────────────────────
  # NGROK - Serviço separado
  # ───────────────────────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    container_name: chatwit_ngrok
    env_file:
      - .env.development.ngrok
    command: http app:3000 --url=moved-chigger-randomly.ngrok-free.app
    ports:
      - "4040:4040"  # Interface web do ngrok
    networks:
      - minha_rede
    depends_on:
      - app
    restart: unless-stopped

volumes:
  node_modules:
    driver: local
  redis_data:
    driver: local
  pg_data:
    driver: local

networks:
  minha_rede:
    external: true
    name: minha_rede
