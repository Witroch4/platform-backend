# -----------------------------------------------------------------------------
# Serviços
# -----------------------------------------------------------------------------
services:
  socialwise_app:
      image: witrocha/socialwise:latest
          command: sh -c "node /app/scripts/db-prepare.js --mode=deploy && node /app/server.js"
              networks:
                    - minha_rede
                        volumes:
      - chatwit_temp:/app/temp
    environment:
      <<: *common-environment
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "3"
          memory: 6024M
      labels:
        - "traefik.enable=true"
        - 'traefik.http.routers.socialwise_app.rule=Host(`socialwise.witdev.com.br`)'
        - "traefik.http.routers.socialwise_app.entrypoints=websecure"
        - "traefik.http.routers.socialwise_app.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.socialwise_app.priority=1"
        - "traefik.http.services.socialwise_app.loadbalancer.server.port=3002"
        - "traefik.http.services.socialwise_app.loadbalancer.passHostHeader=true"
        - "traefik.http.routers.socialwise_app.middlewares=socialwise_app_secure@swarm"
        - "traefik.http.middlewares.socialwise_app_secure.headers.stsSeconds=31536000"
        - "traefik.http.middlewares.socialwise_app_secure.headers.contentTypeNosniff=true"

  worker:
    image: witrocha/socialwise:latest
    command: node /app/dist/worker/init.js
    networks:
      - minha_rede
    volumes:
      - chatwit_temp:/app/temp
    environment:
      <<: *common-environment
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "3"
          memory: 6024M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

# -----------------------------------------------------------------------------
# Infraestrutura
# -----------------------------------------------------------------------------
volumes:
  chatwit_temp:
    external: true
    name: chatwit_temp

networks:
  minha_rede:
    external: true
    name: minha_rede