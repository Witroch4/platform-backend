# Prometheus Alerting Rules for ChatWit AI Integration
# Based on requirements 10.3, 10.4, 11.2

groups:
  - name: chatwit-ai-integration
    rules:
      # High Error Rate Alert
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(ai_jobs_total{status="error"}[5m])) /
            sum(rate(ai_jobs_total[5m]))
          ) * 100 > 5
        for: 5m
        labels:
          severity: warning
          service: chatwit-ai-integration
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }}% over the last 5 minutes, which is above the 5% threshold"

      # Critical Error Rate Alert
      - alert: CriticalErrorRate
        expr: |
          (
            sum(rate(ai_jobs_total{status="error"}[5m])) /
            sum(rate(ai_jobs_total[5m]))
          ) * 100 > 10
        for: 2m
        labels:
          severity: critical
          service: chatwit-ai-integration
        annotations:
          summary: "Critical error rate detected"
          description: "Error rate is {{ $value }}% over the last 5 minutes, which is above the 10% critical threshold"

      # High Latency Alert (P95)
      - alert: HighLatencyP95
        expr: |
          histogram_quantile(0.95, rate(ai_job_latency_ms_bucket[5m])) > 2500
        for: 5m
        labels:
          severity: warning
          service: chatwit-ai-integration
        annotations:
          summary: "High P95 latency detected"
          description: "P95 latency is {{ $value }}ms over the last 5 minutes, which is above the 2.5s threshold"

      # Critical Latency Alert (P99)
      - alert: CriticalLatencyP99
        expr: |
          histogram_quantile(0.99, rate(ai_job_latency_ms_bucket[5m])) > 5000
        for: 5m
        labels:
          severity: critical
          service: chatwit-ai-integration
        annotations:
          summary: "Critical P99 latency detected"
          description: "P99 latency is {{ $value }}ms over the last 5 minutes, which is above the 5s critical threshold"

      # Queue Backlog Alert
      - alert: QueueBacklog
        expr: |
          ai_jobs_in_queue > 100
        for: 5m
        labels:
          severity: warning
          service: chatwit-ai-integration
        annotations:
          summary: "Queue backlog detected"
          description: "Queue {{ $labels.queue_name }} has {{ $value }} jobs waiting, which is above the 100 job threshold"

      # Critical Queue Backlog Alert
      - alert: CriticalQueueBacklog
        expr: |
          ai_jobs_in_queue > 500
        for: 2m
        labels:
          severity: critical
          service: chatwit-ai-integration
        annotations:
          summary: "Critical queue backlog detected"
          description: "Queue {{ $labels.queue_name }} has {{ $value }} jobs waiting, which is above the 500 job critical threshold"

      # High Fallback Rate Alert
      - alert: HighFallbackRate
        expr: |
          (
            sum(rate(ai_fallback_total[10m])) /
            sum(rate(ai_jobs_total[10m]))
          ) * 100 > 20
        for: 10m
        labels:
          severity: warning
          service: chatwit-ai-integration
        annotations:
          summary: "High fallback rate detected"
          description: "Fallback rate is {{ $value }}% over the last 10 minutes, which is above the 20% threshold"

      # DLQ Rate Alert
      - alert: HighDLQRate
        expr: |
          rate(ai_jobs_dlq_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: chatwit-ai-integration
        annotations:
          summary: "High dead letter queue rate"
          description: "DLQ rate is {{ $value }} jobs/second over the last 5 minutes"

      # Circuit Breaker Open Alert
      - alert: CircuitBreakerOpen
        expr: |
          ai_circuit_breaker_state == 1
        for: 1m
        labels:
          severity: critical
          service: chatwit-ai-integration
        annotations:
          summary: "Circuit breaker is open"
          description: "Circuit breaker for {{ $labels.service }} is open, indicating service degradation"

      # No Active Workers Alert
      - alert: NoActiveWorkers
        expr: |
          ai_active_workers == 0
        for: 2m
        labels:
          severity: critical
          service: chatwit-ai-integration
        annotations:
          summary: "No active workers"
          description: "No active workers detected for {{ $labels.worker_type }}, processing will be halted"

      # LLM High Response Time Alert
      - alert: LLMHighResponseTime
        expr: |
          histogram_quantile(0.95, rate(ai_llm_response_time_ms_bucket[5m])) > 10000
        for: 5m
        labels:
          severity: warning
          service: chatwit-ai-integration
        annotations:
          summary: "LLM high response time"
          description: "LLM {{ $labels.model }} {{ $labels.operation }} P95 response time is {{ $value }}ms, above 10s threshold"

      # High Rate Limit Hits Alert
      - alert: HighRateLimitHits
        expr: |
          rate(ai_ratelimit_hits_total[5m]) > 1
        for: 5m
        labels:
          severity: warning
          service: chatwit-ai-integration
        annotations:
          summary: "High rate limit hits"
          description: "Rate limit hits for {{ $labels.scope }} is {{ $value }}/second over the last 5 minutes"

      # Budget Exceeded Alert
      - alert: BudgetExceeded
        expr: |
          increase(ai_budget_exceeded_total[1h]) > 0
        for: 0m
        labels:
          severity: warning
          service: chatwit-ai-integration
        annotations:
          summary: "Budget exceeded"
          description: "Budget exceeded for account {{ $labels.account_id }}"

      # Queue Lag Alert
      - alert: HighQueueLag
        expr: |
          histogram_quantile(0.95, rate(ai_queue_lag_ms_bucket[5m])) > 30000
        for: 5m
        labels:
          severity: warning
          service: chatwit-ai-integration
        annotations:
          summary: "High queue processing lag"
          description: "Queue {{ $labels.queue_name }} P95 lag is {{ $value }}ms, above 30s threshold"

      # Low Intent Confidence Alert
      - alert: LowIntentConfidence
        expr: |
          histogram_quantile(0.50, rate(ai_intent_confidence_score_bucket[10m])) < 0.7
        for: 10m
        labels:
          severity: warning
          service: chatwit-ai-integration
        annotations:
          summary: "Low intent classification confidence"
          description: "Intent {{ $labels.intent_name }} median confidence is {{ $value }}, below 0.7 threshold"

      # Service Down Alert (based on health checks)
      - alert: ServiceDown
        expr: |
          up{job="chatwit-ai-integration"} == 0
        for: 1m
        labels:
          severity: critical
          service: chatwit-ai-integration
        annotations:
          summary: "Service is down"
          description: "ChatWit AI Integration service is not responding to health checks"

      # High Memory Usage Alert (if available)
      - alert: HighMemoryUsage
        expr: |
          (process_resident_memory_bytes / process_virtual_memory_max_bytes) * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: chatwit-ai-integration
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}%, above 80% threshold"

      # High Token Usage Alert
      - alert: HighTokenUsage
        expr: |
          sum(rate(ai_llm_tokens_total_sum[1h])) by (account_id) > 50000
        for: 0m
        labels:
          severity: warning
          service: chatwit-ai-integration
        annotations:
          summary: "High token usage"
          description: "Account {{ $labels.account_id }} has used {{ $value }} tokens in the last hour"

  - name: chatwit-ai-integration-slo
    rules:
      # SLO: 99.9% availability
      - alert: SLOAvailabilityViolation
        expr: |
          (
            sum(rate(ai_jobs_total{status="success"}[5m])) /
            sum(rate(ai_jobs_total[5m]))
          ) < 0.999
        for: 5m
        labels:
          severity: critical
          service: chatwit-ai-integration
          slo: availability
        annotations:
          summary: "SLO availability violation"
          description: "Availability is {{ $value | humanizePercentage }}, below 99.9% SLO"

      # SLO: P95 latency < 2.5s
      - alert: SLOLatencyViolation
        expr: |
          histogram_quantile(0.95, rate(ai_job_latency_ms_bucket[5m])) > 2500
        for: 5m
        labels:
          severity: critical
          service: chatwit-ai-integration
          slo: latency
        annotations:
          summary: "SLO latency violation"
          description: "P95 latency is {{ $value }}ms, above 2.5s SLO"

      # SLO: Error rate < 0.1%
      - alert: SLOErrorRateViolation
        expr: |
          (
            sum(rate(ai_jobs_total{status="error"}[5m])) /
            sum(rate(ai_jobs_total[5m]))
          ) > 0.001
        for: 5m
        labels:
          severity: critical
          service: chatwit-ai-integration
          slo: error_rate
        annotations:
          summary: "SLO error rate violation"
          description: "Error rate is {{ $value | humanizePercentage }}, above 0.1% SLO"