# Configuração Centralizada - Socialwise Chatwit
# Este arquivo centraliza os limites e configurações do sistema

# SocialWise Flow - Concorrência e Performance
socialwise_flow:
  concurrency:
    # Limite de operações simultâneas por inbox
    # Padrão: 100 (aumentado de 3 para melhor performance)
    # ENV: SOCIALWISE_CONCURRENCY_LIMIT
    max_concurrent_llm_calls_per_inbox: 100
    
    # Limite global de operações simultâneas
    # Padrão: 300 (aumentado de 50 para alta demanda)
    # ENV: SOCIALWISE_GLOBAL_CONCURRENCY_LIMIT
    max_concurrent_llm_calls_global: 300
    
    # Timeout da fila de operações em ms
    # ENV: SOCIALWISE_QUEUE_TIMEOUT_MS
    queue_timeout_ms: 5000
    
    # Habilita degradação em casos de sobrecarga
    # ENV: SOCIALWISE_DEGRADATION_ENABLED
    degradation_enabled: true

# Database Connection Pool
database:
  # ENV: DATABASE_CONNECTION_LIMIT
  connection_limit: 10
  
  # ENV: DATABASE_POOL_TIMEOUT
  pool_timeout: 10000
  
  # ENV: DATABASE_QUERY_TIMEOUT
  query_timeout: 30000

# Redis Configuration
redis:
  # ENV: REDIS_MAX_RETRIES
  max_retries: 3
  
  # ENV: REDIS_CONNECT_TIMEOUT
  connect_timeout: 10000
  
  # ENV: REDIS_COMMAND_TIMEOUT
  command_timeout: 5000
  
  # ENV: REDIS_KEEPALIVE
  keepalive: 30000

# Workers Configuration
workers:
  leads_chatwit:
    # ENV: LEADS_CHATWIT_CONCURRENCY
    concurrency: 3
    
    # ENV: LEADS_CHATWIT_LOCK_DURATION
    lock_duration: 60000

# Application Configuration
application:
  # ENV: LOG_LEVEL
  log_level: "info"
  
  # ENV: HEALTH_CHECK_TIMEOUT
  health_check_timeout: 5000
  
  # ENV: HEALTH_CHECK_INTERVAL
  health_check_interval: 30000

# Webhook Processing
webhooks:
  # ENV: WEBHOOK_DIRECT_PROCESSING
  direct_processing: true

# Container Limits (for reference only)
container:
  memory_limit: "1024M"
  cpu_limit: "1.0"

# OAB Evaluation Pipeline
oab_eval:
  # ENV: OAB_EVAL_AGENT_LOCAL
  # Quando true, utiliza agente local (LangGraph) para digitação do manuscrito
  agentelocal: true
  # ENV: OAB_EVAL_TRANSCRIBE_CONCURRENCY
  # Número de páginas processadas em paralelo pelo agente local
  transcribe_concurrency: 10

  # Configurações da fila de transcrição
  queue:
    # Nome da fila (padrão: oab-transcription)
    name: 'oab-transcription'
    # Máximo de digitações simultâneas (jobs concorrentes)
    # ENV: OAB_EVAL_MAX_CONCURRENT_JOBS
    max_concurrent_jobs: 3
    # Timeout para cada job de transcrição (ms)
    # ENV: OAB_EVAL_JOB_TIMEOUT
    job_timeout: 300000  # 5 minutos
    # Tentativas de retry em caso de falha
    # ENV: OAB_EVAL_RETRY_ATTEMPTS
    retry_attempts: 2

  # Configurações de debug e logging
  debug:
    # Habilita logs detalhados do processo
    # ENV: OAB_EVAL_DEBUG_ENABLED
    enabled: true
    # Loga o prompt usado no blueprint
    # ENV: OAB_EVAL_LOG_PROMPTS
    log_prompts: true
    # Loga quantidade de tokens consumidos
    # ENV: OAB_EVAL_LOG_TOKENS
    log_tokens: true
    # Dump completo do payload (apenas em desenvolvimento)
    # ENV: OAB_EVAL_DUMP_PAYLOAD
    dump_payload: false

# Observações:
# - Os valores definidos aqui são padrões
# - Use variáveis de ambiente (ENV) para sobrescrever em produção
# - Monitore o desempenho após mudanças nos limites
# - O limite de 100 por inbox resolve o problema de "Sistema ocupado"
