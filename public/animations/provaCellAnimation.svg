<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="100%" height="100%">
  <defs>
    <mask id="wipeMask">
      <rect x="0" y="0" width="0" height="100" fill="white">
        <animate attributeName="width" values="0; 280; 280; 0; 0" keyTimes="0; 0.3; 0.9; 0.95; 1" dur="8s" repeatCount="indefinite"/>
      </rect>
    </mask>
  </defs>

  <!-- Partículas de estrelas brilhantes de 4 pontas (substituindo os círculos) -->
  <g fill="#D4AF37">
    <g transform="translate(40, 25)">
      <path d="M0,-6 C0,-2 2,0 6,0 C2,0 0,2 0,6 C0,2 -2,0 -6,0 C-2,0 0,-2 0,-6 Z">
        <animateTransform attributeName="transform" type="scale" values="0; 1.5; 0" dur="2.5s" begin="0s" repeatCount="indefinite" additive="sum"/>
        <animate attributeName="opacity" values="0; 0.8; 0" dur="2.5s" begin="0s" repeatCount="indefinite"/>
      </path>
    </g>
    <g transform="translate(260, 20)">
      <path d="M0,-8 C0,-3 3,0 8,0 C3,0 0,3 0,8 C0,3 -3,0 -8,0 C-3,0 0,-3 0,-8 Z">
        <animateTransform attributeName="transform" type="scale" values="0; 1.2; 0" dur="3.2s" begin="0.7s" repeatCount="indefinite" additive="sum"/>
        <animate attributeName="opacity" values="0; 0.9; 0" dur="3.2s" begin="0.7s" repeatCount="indefinite"/>
      </path>
    </g>
    <g transform="translate(150, 15)">
      <path d="M0,-5 C0,-2 2,0 5,0 C2,0 0,2 0,5 C0,2 -2,0 -5,0 C-2,0 0,-2 0,-5 Z">
        <animateTransform attributeName="transform" type="scale" values="0; 1.8; 0" dur="2.8s" begin="1.5s" repeatCount="indefinite" additive="sum"/>
        <animate attributeName="opacity" values="0; 0.7; 0" dur="2.8s" begin="1.5s" repeatCount="indefinite"/>
      </path>
    </g>
    <g transform="translate(80, 85)">
      <path d="M0,-6 C0,-2 2,0 6,0 C2,0 0,2 0,6 C0,2 -2,0 -6,0 C-2,0 0,-2 0,-6 Z">
        <animateTransform attributeName="transform" type="scale" values="0; 1; 0" dur="3s" begin="0.3s" repeatCount="indefinite" additive="sum"/>
        <animate attributeName="opacity" values="0; 1; 0" dur="3s" begin="0.3s" repeatCount="indefinite"/>
      </path>
    </g>
    <g transform="translate(230, 80)">
      <path d="M0,-7 C0,-2.5 2.5,0 7,0 C2.5,0 0,2.5 0,7 C0,2.5 -2.5,0 -7,0 C-2.5,0 0,-2.5 0,-7 Z">
        <animateTransform attributeName="transform" type="scale" values="0; 1.3; 0" dur="3.5s" begin="2s" repeatCount="indefinite" additive="sum"/>
        <animate attributeName="opacity" values="0; 0.8; 0" dur="3.5s" begin="2s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <!-- Texto Cursivo -->
  <text x="150" y="75" font-family="'Brush Script MT', 'Dancing Script', 'Comic Sans MS', cursive" font-size="28" fill="#2C3E50" text-anchor="middle" mask="url(#wipeMask)">
    Escrevendo a Prova
    <animate attributeName="opacity" values="1; 1; 0; 0" keyTimes="0; 0.9; 0.95; 1" dur="8s" repeatCount="indefinite"/>
  </text>

  <!-- Animação da Caneta -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="30,75; 270,75; 270,75" keyTimes="0; 0.3; 1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1; 1; 0; 0; 0" keyTimes="0; 0.28; 0.3; 0.95; 1" dur="8s" repeatCount="indefinite"/>
    <path d="M0,0 L18,-25 L24,-18 Z" fill="#D4AF37"/>
    <path d="M0,0 L10,-6 L6,-10 Z" fill="#2C3E50"/>
  </g>

  <!-- Animação do Chapéu -->
  <g>
    <animate attributeName="opacity" values="0; 0; 1; 1; 0; 0" keyTimes="0; 0.32; 0.37; 0.58; 0.63; 1" dur="8s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="150,35" dur="8s" repeatCount="indefinite"/>
    <path d="M-22,-6 L0,-16 L22,-6 L0,4 Z" fill="#2C3E50"/>
    <path d="M-12,-1 L-12,9 C-12,15 12,15 12,9 L12,-1" fill="#2C3E50"/>
    <path d="M16,-3 L16,11 L19,14 L19,-5 Z" fill="#D4AF37"/>
  </g>
</svg>