<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <style>
      /* Configuração das animações em loop infinito */
      .stem {
        stroke-dasharray: 200;
        animation: growStem 2.5s ease-in-out infinite alternate;
      }
      
      .leaf1 {
        transform-origin: 394px 367px;
        animation: growLeaf1 2.5s cubic-bezier(0.34, 1.56, 0.64, 1.2) infinite alternate;
      }
      
      .leaf2 {
        transform-origin: 391px 313px;
        animation: growLeaf2 2.5s cubic-bezier(0.34, 1.56, 0.64, 1.2) infinite alternate;
      }
      
      .leaf3 {
        transform-origin: 400px 250px;
        animation: growLeaf3 2.5s cubic-bezier(0.34, 1.56, 0.64, 1.2) infinite alternate;
      }

      .base-leaf-left {
        transform-origin: 400px 425px;
        animation: baseLeft 2.5s ease-in-out infinite alternate;
      }
      
      .base-leaf-right {
        transform-origin: 400px 425px;
        animation: baseRight 2.5s ease-in-out infinite alternate;
      }

      /* Linhas do tempo (Keyframes) com atrasos embutidos nas porcentagens */
      @keyframes growStem {
        0%, 10% { stroke-dashoffset: 165; }
        70%, 100% { stroke-dashoffset: 0; }
      }

      @keyframes growLeaf1 {
        0%, 25% { transform: scale(0); opacity: 0; }
        75%, 100% { transform: scale(1); opacity: 1; }
      }

      @keyframes growLeaf2 {
        0%, 40% { transform: scale(0); opacity: 0; }
        85%, 100% { transform: scale(1); opacity: 1; }
      }

      @keyframes growLeaf3 {
        0%, 55% { transform: scale(0); opacity: 0; }
        95%, 100% { transform: scale(1); opacity: 1; }
      }

      @keyframes baseLeft {
        0%, 10% { transform: scale(1) rotate(0deg); }
        70%, 100% { transform: scale(1.15) rotate(-8deg); }
      }

      @keyframes baseRight {
        0%, 10% { transform: scale(1) rotate(0deg); }
        70%, 100% { transform: scale(1.15) rotate(8deg); }
      }
    </style>
  </defs>

  <g id="pot">
    <path d="M 340 450 L 460 450 L 430 550 C 420 560, 380 560, 370 550 Z" fill="#D27D5E"/>
    <path d="M 340 450 L 460 450 L 455 465 L 345 465 Z" fill="#C26D4F"/>
    <rect x="330" y="430" width="140" height="20" rx="6" fill="#E08B6C"/>
    <ellipse cx="400" cy="430" rx="60" ry="6" fill="#5A4A42"/>
  </g>

  <g id="plant">
    <path class="stem" d="M 400 430 C 400 370, 380 310, 400 250" fill="none" stroke="#547A41" stroke-width="8" stroke-linecap="round" />

    <path class="base-leaf-left" d="M 400 425 C 385 420, 370 405, 365 390 C 380 395, 395 410, 400 425" fill="#688F52"/>
    <path class="base-leaf-right" d="M 400 425 C 415 420, 430 405, 435 390 C 420 395, 405 410, 400 425" fill="#688F52"/>

    <g class="leaf1">
      <path d="M 394 367 C 434 357, 461 327, 471 287 C 436 297, 411 327, 394 367" fill="#688F52"/>
      <path d="M 394 367 Q 431 332 471 287" fill="none" stroke="#84B06A" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <g class="leaf2">
      <path d="M 391 313 C 345 308, 310 278, 295 233 C 325 238, 360 268, 391 313" fill="#688F52"/>
      <path d="M 391 313 Q 340 278 295 233" fill="none" stroke="#84B06A" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <g class="leaf3">
      <path d="M 400 250 C 420 200, 410 140, 370 100 C 350 150, 365 200, 400 250" fill="#688F52"/>
      <path d="M 400 250 Q 395 180 370 100" fill="none" stroke="#84B06A" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>
</svg>