<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <style>
    /* Configuração das linhas desenhando */
    .flow-line {
      stroke-dasharray: 20;
      stroke-dashoffset: 20;
      /* O 'forwards' garante que a animação pare no estado final */
      animation: draw-line 0.5s ease-out forwards;
    }
    .flow-line-top {
      animation-delay: 0.3s;
    }
    .flow-line-bottom {
      animation-delay: 0.4s; /* Leve atraso para criar um efeito em cascata */
    }

    /* Configuração dos nós (bolinhas) surgindo */
    .flow-node {
      opacity: 0;
      animation: pop-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; /* Curva de animação para dar um leve 'pulo' */
    }
    .node-start {
      transform-origin: 5px 12px;
      animation-delay: 0s;
    }
    .node-end-1 {
      transform-origin: 19px 6px;
      animation-delay: 0.7s;
    }
    .node-end-2 {
      transform-origin: 19px 18px;
      animation-delay: 0.8s;
    }

    /* Keyframes */
    @keyframes draw-line {
      to { stroke-dashoffset: 0; }
    }
    @keyframes pop-in {
      0% { opacity: 0; transform: scale(0); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>

  <path class="flow-line flow-line-top" d="M 7.5 12 C 11.5 12, 13.5 6, 16.5 6" />
  <path class="flow-line flow-line-bottom" d="M 7.5 12 C 11.5 12, 13.5 18, 16.5 18" />

  <circle class="flow-node node-start" cx="5" cy="12" r="2.5" fill="currentColor" />
  
  <circle class="flow-node node-end-1" cx="19" cy="6" r="2.5" />
  <circle class="flow-node node-end-2" cx="19" cy="18" r="2.5" />
</svg>