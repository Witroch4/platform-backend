<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="instaGrad" x1="15%" y1="100%" x2="85%" y2="0%">
      <stop offset="0%" stop-color="#fdf497" />
      <stop offset="25%" stop-color="#fd5949" />
      <stop offset="50%" stop-color="#d6249f" />
      <stop offset="100%" stop-color="#285AEB" />
    </linearGradient>

    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0" />
      <stop offset="50%" stop-color="white" stop-opacity="0.95" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>

    <mask id="powerUpMask">
      <circle cx="100" cy="100" r="0" fill="white">
        <animate attributeName="r" from="0" to="220" begin="clicker.click" dur="1.2s" calcMode="spline" keySplines="0.25 0.1 0.25 1" fill="freeze" />
      </circle>
    </mask>

    <mask id="logoMask">
      <rect x="20" y="20" width="160" height="160" rx="35" fill="white" />
    </mask>
  </defs>

  <rect x="20" y="20" width="160" height="160" rx="35" fill="url(#instaGrad)" mask="url(#powerUpMask)" />

  <g>
    <rect x="52" y="52" width="96" height="96" rx="24" fill="none" stroke="#aaaaaa" stroke-width="10">
      <animate attributeName="stroke" from="#aaaaaa" to="#ffffff" begin="clicker.click" dur="0.8s" fill="freeze" />
    </rect>

    <circle cx="100" cy="100" r="22" fill="none" stroke="#aaaaaa" stroke-width="10">
       <animate attributeName="stroke" from="#aaaaaa" to="#ffffff" begin="clicker.click" dur="0.8s" fill="freeze" />
    </circle>

    <circle cx="128" cy="72" r="6" fill="#aaaaaa">
       <animate attributeName="fill" from="#aaaaaa" to="#ffffff" begin="clicker.click" dur="0.8s" fill="freeze" />
    </circle>
  </g>

  <g mask="url(#logoMask)">
    <polygon points="-60,0 20,0 -20,200 -100,200" fill="url(#shineGrad)" transform="translate(-80, 0)" opacity="0">
      <animateTransform attributeName="transform" type="translate" from="-80 0" to="380 0" begin="clicker.click+0.6s" dur="1.2s" fill="freeze" />
      <animate attributeName="opacity" values="0; 1; 1; 0" keyTimes="0; 0.1; 0.9; 1" begin="clicker.click+0.6s" dur="1.2s" fill="freeze" />
    </polygon>
  </g>

  <rect id="clicker" x="0" y="0" width="200" height="200" fill="transparent" cursor="pointer" />
</svg>