<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="100%" height="100%" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Base lines drawing -->
  <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke-dasharray="100" stroke-dashoffset="100">
    <animate attributeName="stroke-dashoffset" values="100; 0" begin="0.2s" dur="1s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" />
  </path>
  
  <!-- Door drawing -->
  <polyline points="9 22 9 12 15 12 15 22" stroke-dasharray="50" stroke-dashoffset="50">
    <animate attributeName="stroke-dashoffset" values="50; 0" begin="0.8s" dur="0.8s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" />
  </polyline>

  <!-- Chimney drawing -->
  <path d="M17 5v-3h2v5" stroke-dasharray="20" stroke-dashoffset="20">
    <animate attributeName="stroke-dashoffset" values="20; 0" begin="1.2s" dur="0.5s" fill="freeze" />
  </path>

  <!-- Pulsing roof highlight (premium feel) -->
  <path d="M3 9l9-7 9 7" stroke="#000000" stroke-width="2.5" opacity="0">
    <animate attributeName="opacity" values="0; 0.6; 0" begin="2s" dur="4s" repeatCount="indefinite" />
  </path>

  <!-- Elegant floating smoke 1 -->
  <g opacity="0" fill="#000000" stroke="none">
    <circle cx="18" cy="1" r="1.5">
      <animate attributeName="r" values="1; 2.5; 3" begin="1.5s" dur="4s" repeatCount="indefinite" />
      <animate attributeName="cy" values="1; -3; -6" begin="1.5s" dur="4s" repeatCount="indefinite" />
    </circle>
    <animate attributeName="opacity" values="0; 0.5; 0" begin="1.5s" dur="4s" repeatCount="indefinite" />
  </g>
  
  <!-- Elegant floating smoke 2 -->
  <g opacity="0" fill="#000000" stroke="none">
    <circle cx="17.5" cy="0" r="1.2">
      <animate attributeName="r" values="1.2; 2; 2.5" begin="3s" dur="3s" repeatCount="indefinite" />
      <animate attributeName="cy" values="0; -4; -8" begin="3s" dur="3s" repeatCount="indefinite" />
      <animate attributeName="cx" values="17.5; 16.5; 15" begin="3s" dur="3s" repeatCount="indefinite" />
    </circle>
    <animate attributeName="opacity" values="0; 0.4; 0" begin="3s" dur="3s" repeatCount="indefinite" />
  </g>
</svg>
